<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jed Oei</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #000000;
      --card: rgba(28, 28, 30, 0.85);
      --text-primary: #f5f5f7;
      --text-secondary: #98989d;
      --accent: #2997ff;
      --accent-hover: #47a8ff;
      --border: rgba(255, 255, 255, 0.08);
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      --shadow-hover: 0 8px 32px rgba(0, 0, 0, 0.6);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
    }

    /* Subtle gradient background blobs */
    body::before {
      content: "";
      position: fixed;
      top: -20%;
      left: -10%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(41, 151, 255, 0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      bottom: -20%;
      right: -10%;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, rgba(100, 210, 255, 0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Avatar */
    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0071e3 0%, #64d2ff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -1px;
      box-shadow: 0 8px 24px rgba(0, 113, 227, 0.25);
      flex-shrink: 0;
      animation: fadeUp 0.8s 0.05s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    /* Profile card */
    .profile {
      text-align: center;
      animation: fadeUp 0.8s 0.1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .profile h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-primary);
      line-height: 1.1;
    }

    .profile p {
      margin-top: 10px;
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.55;
      max-width: 340px;
    }

    /* Links */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--card);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 22px;
      text-decoration: none;
      color: var(--text-primary);
      box-shadow: var(--shadow);
      transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1),
                  box-shadow 0.25s cubic-bezier(0.22, 1, 0.36, 1),
                  background 0.2s ease;
      cursor: pointer;
    }

    .link-card:hover {
      transform: translateY(-3px) scale(1.01);
      box-shadow: var(--shadow-hover);
      background: rgba(44, 44, 46, 0.95);
    }

    .link-card:active {
      transform: translateY(0) scale(0.99);
      box-shadow: var(--shadow);
    }

    .link-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-icon svg {
      width: 22px;
      height: 22px;
    }

    .link-icon.phone  { background: linear-gradient(135deg, #34c759, #30d158); }
    .link-icon.email  { background: linear-gradient(135deg, #0071e3, #34aadc); }
    .link-icon.linkedin { background: linear-gradient(135deg, #0077b5, #00a0dc); }

    .link-text {
      flex: 1;
      min-width: 0;
    }

    .link-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 2px;
    }

    .link-value {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-arrow {
      color: var(--text-secondary);
      opacity: 0.5;
      transition: opacity 0.2s, transform 0.25s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .link-card:hover .link-arrow {
      opacity: 1;
      transform: translateX(3px);
    }

    /* Staggered animation for link cards */
    .links .link-card:nth-child(1) { animation: fadeUp 0.7s 0.18s cubic-bezier(0.22, 1, 0.36, 1) both; }
    .links .link-card:nth-child(2) { animation: fadeUp 0.7s 0.26s cubic-bezier(0.22, 1, 0.36, 1) both; }
    .links .link-card:nth-child(3) { animation: fadeUp 0.7s 0.34s cubic-bezier(0.22, 1, 0.36, 1) both; }

    /* Footer */
    footer {
      font-size: 12px;
      color: var(--text-secondary);
      opacity: 0.6;
      animation: fadeUp 0.7s 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @media (max-width: 420px) {
      .profile h1 { font-size: 26px; }
      .link-card { padding: 15px 18px; }
    }
  </style>
</head>
<body>

    <div class="avatar">JO</div>

      <p>Year 2 student at QUT studying Construction Management &amp; Quantity Surveying</p>

          <div class="link-label">Email</div>

        <svg class="link-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">

        <svg class="link-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">

</body>
</html>
