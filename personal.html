<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jed Oei</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #060f1c;
      --navy2:  #091523;
      --cyan:   #41b8f5;
      --cyan2:  #7dd3fc;
      --text:   #c8e4f5;
      --bright: #eef8ff;
      --mono:   'DM Mono', monospace;
      --serif:  'Cormorant Garamond', serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--mono);
      background: var(--navy);
      color: var(--text);
      overflow-x: hidden;
    }
  </style>
</head>
<body>

<!-- ── HERO: Scroll Image Sequence ── -->
<section class="hero">

  <!-- Internal scroll container (traps scroll, invisible) -->
  <div class="hero-scroll" id="heroScroll">
    <div class="hero-spacer" id="heroSpacer"></div>
  </div>

  <!-- Image layer (overlays scroll container) -->
  <div class="hero-image" id="heroImage" aria-hidden="true">
    <img id="heroImg" src="https://picsum.photos/seed/1/1920/1080" alt="" />
  </div>

  <!-- Text overlay (fades in on last frame) -->
  <div class="hero-text" id="heroText" aria-hidden="true">
    <div class="hero-live">
      <span class="live-dot"></span>
      <span>Live</span>
    </div>
    <h1 class="hero-name">Jed <em>Oei</em></h1>
    <p class="hero-role">CM &amp; QS Student &middot; QUT</p>
    <a class="hero-cta" href="#contact">View Contact &rarr;</a>
  </div>

  <!-- Progress bar -->
  <div class="hero-progress" aria-hidden="true">
    <div class="hero-progress-fill" id="heroFill"></div>
  </div>

  <!-- Scroll hint -->
  <div class="scroll-hint" id="scrollHint" aria-hidden="true">
    <span>Scroll</span>
    <div class="scroll-hint-line"></div>
  </div>

</section>

</body>
</html>
